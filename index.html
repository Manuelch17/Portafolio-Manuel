<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <h1>🚀 TaskFlow</h1>
      <p>Organiza tu día como un pro</p>
    </header>

    <!-- Card principal -->
    <main class="card">
      <div class="input-group">
        <input type="text" id="taskInput" placeholder="¿Qué necesitas hacer hoy?">
        <button id="addBtn">+</button>
      </div>

      <!-- Filtros -->
      <div class="filters">
        <button class="filter active" data-filter="all">Todas</button>
        <button class="filter" data-filter="pending">Pendientes</button>
        <button class="filter" data-filter="completed">Completadas</button>
      </div>

      <!-- Lista -->
      <ul id="taskList"></ul>

      <!-- Footer -->
      <div class="footer">
        <span id="taskCount">0 tareas</span>
        <button id="clearCompleted">Limpiar completadas</button>
      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
